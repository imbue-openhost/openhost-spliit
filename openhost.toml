[app]
name = "spliit"
version = "0.1.0"
description = "Spliit — a minimalist shared-expense / bill-splitting app, packaged for OpenHost with owner SSO and public group-link sharing."
authors = ["Andrew Laack <andrew@laack.co>"]

[runtime.container]
image = "Dockerfile"
port = 8080

[routing]
health_check = "/_healthz"

# Paths the OpenHost router lets through WITHOUT zone_auth.
#
# Spliit's sharing model: a group is reached purely by its unguessable
# nanoid URL (/groups/<id>...). To let the owner share a group with friends
# who do not have an OpenHost account, we expose the group pages plus the
# API and static assets those pages need. The landing page ("/") and the
# recent-groups list are NOT public, so only the zone_auth'd owner sees the
# app shell.
#
# IMPORTANT: never list "/" here — the router treats it as a catch-all
# prefix that would make the entire app public and break owner SSO.
#
# The router's matching is PREFIX-based, so "/groups/" also matches the
# fixed "/groups/create" page and "/api/" also matches the privileged
# groups.create mutation + the s3-upload handler. Those owner-only endpoints
# are therefore re-gated by openhost/auth_proxy.py, which checks the
# router-stamped X-OpenHost-Is-Owner header. Keep that gating list in the
# proxy in sync with these prefixes.
public_paths = [
    "/_healthz",
    # Shared group pages (view / edit / add expenses / balances / stats /
    # activity / info / export) all live under /groups/<id>...
    # (/groups/create is re-gated to the owner by the auth-proxy.)
    "/groups/",
    # tRPC + API routes the group pages call (data reads + per-group writes,
    # s3 uploads when enabled, health). The auth-proxy re-gates the
    # groups.create mutation and /api/s3-upload to the owner.
    "/api/",
    # Next.js runtime assets + optimized images.
    "/_next/",
    # App icons / manifest / static files served from /public.
    "/favicon.ico",
    "/icon.svg",
    "/apple-icon.png",
    "/manifest.webmanifest",
    "/robots.txt",
    "/sitemap.xml",
    "/logo/",
    "/logo.svg",
    "/logo-with-text.png",
    "/banner.png",
    "/android-chrome-192x192.png",
    "/android-chrome-512x512.png",
]

[resources]
memory_mb = 1024
# Fractional CPU cores (1.0 = one core). Replaces the deprecated
# cpu_millicores field.
cpu_cores = 1.0

[data]
app_data = true
app_temp_data = true
