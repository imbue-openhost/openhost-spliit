[app]
name = "spliit"
version = "0.1.0"
description = "Spliit — a minimalist shared-expense / bill-splitting app, packaged for OpenHost with owner SSO and public group-link sharing."
authors = ["Andrew Laack <andrew@laack.co>"]

[runtime.container]
image = "Dockerfile"
port = 8080

[routing]
health_check = "/_healthz"

# Paths the OpenHost router lets through WITHOUT zone_auth.
#
# Spliit's sharing model: a group is reached purely by its unguessable
# nanoid URL (/groups/<id>...). To let the owner share a group with friends
# who do not have an OpenHost account, we expose the group pages plus the
# API and static assets those pages need. The landing page ("/") is not
# listed, so the app shell stays owner-gated by the router.
#
# The router's public-path matching is PREFIX-based, so listing "/groups/"
# also (unavoidably) exposes the fixed /groups/create page and the /groups
# recent-list, and listing "/api/" exposes the tRPC groups.create mutation.
# Those specific owner-only paths are therefore re-gated in
# openhost/auth_proxy.py (it checks the router-stamped X-OpenHost-Is-Owner
# header). So the split of responsibility is: the ROUTER does the bulk of
# the gating via these prefixes, and the AUTH-PROXY additionally re-gates the
# few owner-only paths that collide with a public prefix. Keep the proxy's
# OWNER_ONLY_* lists in sync with these entries.
#
# IMPORTANT: never list "/" here — the router treats it as a catch-all
# prefix that would make the entire app public and break owner SSO.
public_paths = [
    "/_healthz",
    # Shared group pages (view / edit / add expenses / balances / stats /
    # activity / info / export) all live under /groups/<id>...
    "/groups/",
    # tRPC + API routes the group pages call (data reads + mutations,
    # s3 uploads when enabled, health).
    "/api/",
    # Next.js runtime assets + optimized images.
    "/_next/",
    # App icons / manifest / static files served from /public.
    "/favicon.ico",
    "/icon.svg",
    "/apple-icon.png",
    "/manifest.webmanifest",
    "/robots.txt",
    "/sitemap.xml",
    "/logo/",
    "/logo.svg",
    "/logo-with-text.png",
    "/banner.png",
    "/android-chrome-192x192.png",
    "/android-chrome-512x512.png",
]

[resources]
memory_mb = 1024
cpu_millicores = 1000

[data]
app_data = true
app_temp_data = true
